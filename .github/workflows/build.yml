name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # Quick checks on PRs — runs on GitHub-hosted (safe for public repo forks)
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Run unit tests
        run: ./gradlew test

  # Full build on push to main — runs on self-hosted FRAME-DESK
  build:
    if: github.event_name == 'push'
    runs-on: [self-hosted, linux, android]

    env:
      ANDROID_HOME: /opt/android-sdk

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run tests and build APKs
        run: ./gradlew test assembleDebug assembleRelease bundleRelease

      - name: Copy build outputs for MCP access
        run: |
          mkdir -p /srv/mcp-android/builds
          cp app/build/outputs/apk/debug/app-debug.apk /srv/mcp-android/builds/embara-debug.apk || echo "Debug APK not found, skipping"
          cp app/build/outputs/apk/release/app-release-unsigned.apk /srv/mcp-android/builds/embara-release-unsigned.apk || echo "Release APK not found, skipping"
          cp app/build/outputs/bundle/release/app-release.aab /srv/mcp-android/builds/embara-release.aab || echo "Release AAB not found, skipping"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: embara-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: embara-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: embara-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
          if-no-files-found: warn

  # Instrumented tests on emulator — runs after build, does not block release
  instrumented-tests:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: [self-hosted, linux, android]

    env:
      ANDROID_HOME: /opt/android-sdk

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Check for connected emulator
        id: emulator-check
        run: |
          SERIAL=$(adb devices | grep -E '^emulator-' | head -1 | awk '{print $1}')
          if [ -z "$SERIAL" ]; then
            echo "No emulator found — skipping instrumented tests"
            echo "available=false" >> $GITHUB_OUTPUT
          else
            echo "Found emulator: $SERIAL"
            echo "available=true" >> $GITHUB_OUTPUT
            echo "serial=$SERIAL" >> $GITHUB_OUTPUT
          fi

      - name: Run instrumented tests
        if: steps.emulator-check.outputs.available == 'true'
        run: ./gradlew connectedDebugAndroidTest
        continue-on-error: true

      - name: Upload test results
        if: always() && steps.emulator-check.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: app/build/reports/androidTests/
          retention-days: 30
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download unsigned release APK
        uses: actions/download-artifact@v4
        with:
          name: embara-release-unsigned
          path: unsigned/

      - name: Download release AAB
        uses: actions/download-artifact@v4
        with:
          name: embara-release-aab
          path: aab/

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > embara-release.jks

      - name: Sign APK with apksigner
        run: |
          mkdir -p signed
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -1)
          $APKSIGNER sign \
            --ks embara-release.jks \
            --ks-pass env:EMBARA_KEYSTORE_PASSWORD \
            --ks-key-alias "$EMBARA_KEY_ALIAS" \
            --key-pass env:EMBARA_KEY_PASSWORD \
            --out signed/embara-release.apk \
            unsigned/app-release-unsigned.apk
        env:
          EMBARA_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          EMBARA_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          EMBARA_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Sign AAB with jarsigner
        run: |
          mkdir -p signed-aab
          cp aab/app-release.aab signed-aab/embara-release.aab
          jarsigner -keystore embara-release.jks \
            -storepass "$EMBARA_KEYSTORE_PASSWORD" \
            -keypass "$EMBARA_KEY_PASSWORD" \
            signed-aab/embara-release.aab \
            "$EMBARA_KEY_ALIAS"
        env:
          EMBARA_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          EMBARA_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          EMBARA_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Generate SHA-256 checksums
        run: |
          cd signed && sha256sum embara-release.apk > embara-release.apk.sha256
          cd ../signed-aab && sha256sum embara-release.aab > embara-release.aab.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            signed/embara-release.apk
            signed/embara-release.apk.sha256
            signed-aab/embara-release.aab
            signed-aab/embara-release.aab.sha256
          generate_release_notes: true

      - name: Cleanup keystore
        if: always()
        run: rm -f embara-release.jks
