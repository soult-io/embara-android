name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # Quick checks on PRs — runs on GitHub-hosted (safe for public repo forks)
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Run unit tests
        run: ./gradlew test

  # Full build on push to main — runs on self-hosted FRAME-DESK
  build:
    if: github.event_name == 'push'
    runs-on: [self-hosted, linux, android]

    steps:
      - uses: actions/checkout@v4

      - name: Run tests and build APKs
        run: ./gradlew test assembleDebug assembleRelease

      - name: Copy build outputs to /data/builds for MCP access
        run: |
          mkdir -p /data/builds
          cp app/build/outputs/apk/debug/app-debug.apk /data/builds/embara-debug.apk || echo "Debug APK not found, skipping"
          cp app/build/outputs/apk/release/app-release-unsigned.apk /data/builds/embara-release-unsigned.apk || echo "Release APK not found, skipping"
          cp app/build/outputs/bundle/release/app-release.aab /data/builds/embara-release.aab || echo "Release AAB not found, skipping"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: embara-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > embara-release.jks

      - name: Build signed release APK
        run: ./gradlew assembleRelease
        env:
          EMBARA_KEYSTORE_FILE: ${{ github.workspace }}/embara-release.jks
          EMBARA_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          EMBARA_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          EMBARA_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Generate SHA-256 checksum
        run: |
          cd app/build/outputs/apk/release
          APK=$(ls *.apk | head -1)
          sha256sum "$APK" > "$APK.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/*.sha256
          generate_release_notes: true

      - name: Cleanup keystore
        if: always()
        run: rm -f embara-release.jks
